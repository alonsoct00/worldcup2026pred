name: Daily World Cup Sync
on:
  schedule:
    - cron: '0 6 * * *'
    - cron: '0 22 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no file writes)'
        type: boolean
        default: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 1

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run sync
        run: |
          if [ "${{ github.event.inputs.dry_run }}" == "true" ]; then
            npm run sync:dry
          else
            npm run sync
          fi
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          OPENFOOTBALL_TOKEN: ${{ secrets.OPENFOOTBALL_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit and push if worldcup.ts changed
        run: |
          git config user.email "sync-bot@worldcup2026.app"
          git config user.name "WC2026 Sync Bot"
          if git diff --quiet src/data/worldcup.ts; then
            echo "No changes to commit"
          else
            git add src/data/worldcup.ts
            git commit -m "sync: $(TZ='America/Mexico_City' date '+%Y-%m-%d %H:%M MT')"
            git push origin main
            echo "✅ Pushed updated worldcup.ts"
          fi

      - name: Summary
        if: always()
        run: echo "Sync finished at $(TZ='America/Mexico_City' date)"
